# CI compile target — imports packages/ble.yaml (BLE enablement) once and
# packages/canonical.yaml twice (two remotes), proving both packages compile and
# that multiple canonical includes merge into distinct sub-devices.
esphome:
  name: blekb-pkg

esp32:
  board: m5stack-atom

logger:

external_components:
  - source:
      type: local
      path: ../components
    components: [ble_keyboard]

packages:
  ble: !include
    file: ../packages/ble.yaml
    vars:
      device_name: Pkg Test
  living_tv: !include
    file: ../packages/canonical.yaml
    vars:
      device_id: living_tv
      device_name: Living TV
  bedroom_tv: !include
    file: ../packages/canonical.yaml
    vars:
      device_id: bedroom_tv
      device_name: Bedroom TV
