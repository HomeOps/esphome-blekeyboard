# CI compile target — imports keyboard.yaml + media_keys.yaml + gamepad.yaml onto
# the SAME device (via top-level substitutions), exactly as a generated config does:
#   packages:
#     ble:     packages/keyboard.yaml
#     remote:  packages/media_keys.yaml
#     gamepad: packages/gamepad.yaml
# keyboard.yaml declares the device ONCE; media_keys/gamepad only add buttons to it.
# This proves the three packages compose on one device without an "id redefined"
# clash (the case that regressed), and that keyboard.yaml's `api: services:` merges
# with a user's own `api:` block.
esphome:
  name: blekb-pkg

esp32:
  board: m5stack-atom

logger:

wifi:
  ssid: "test-ssid"
  password: "test-password"

# A user's own api: block — keyboard.yaml's `api: services:` merges into it.
api:

substitutions:
  ble_device_id: master_bedroom_tv_remote
  ble_device_name: "Master Room TV Remote"

external_components:
  - source:
      type: local
      path: ../components
    components: [ble_keyboard]

packages:
  ble:     !include ../packages/keyboard.yaml
  remote:  !include ../packages/media_keys.yaml
  gamepad: !include ../packages/gamepad.yaml
