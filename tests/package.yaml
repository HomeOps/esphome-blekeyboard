# CI compile target — imports packages/canonical.yaml twice (two remotes) to prove
# the importable canonical-controls package compiles and that multiple includes
# with different device_ids merge into distinct sub-devices.
esphome:
  name: blekb-pkg

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_ENABLED: y
      CONFIG_BT_CONTROLLER_ENABLED: y
      CONFIG_BT_BLUEDROID_ENABLED: y
      CONFIG_BT_NIMBLE_ENABLED: n
      CONFIG_BT_BLE_ENABLED: y
      CONFIG_BT_GATTS_ENABLE: y
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: n
      CONFIG_BT_BLE_42_ADV_EN: y
      CONFIG_BT_BLE_42_SCAN_EN: y
      CONFIG_BT_BLE_SMP_ENABLE: y
      CONFIG_BT_ACL_CONNECTIONS: "4"

logger:

external_components:
  - source:
      type: local
      path: ../components
    components: [ble_keyboard]

ble_keyboard:
  id: kb
  device_name: "Pkg Test"

packages:
  living_tv: !include
    file: ../packages/canonical.yaml
    vars:
      device_id: living_tv
      device_name: Living TV
      ble_keyboard_id: kb
  bedroom_tv: !include
    file: ../packages/canonical.yaml
    vars:
      device_id: bedroom_tv
      device_name: Bedroom TV
      ble_keyboard_id: kb
