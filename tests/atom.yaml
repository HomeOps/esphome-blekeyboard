# CI compile target — M5 Atom Lite as a BLE media keyboard.
# Compiles the component from the working tree (local source), so CI fails the
# moment the component stops building on current ESPHome.
esphome:
  name: blekb-atom

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_ENABLED: y
      CONFIG_BT_CONTROLLER_ENABLED: y
      CONFIG_BT_BLUEDROID_ENABLED: y
      CONFIG_BT_NIMBLE_ENABLED: n
      CONFIG_BT_BLE_ENABLED: y
      CONFIG_BT_GATTS_ENABLE: y
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: n
      CONFIG_BT_BLE_42_ADV_EN: y
      CONFIG_BT_BLE_42_SCAN_EN: y
      CONFIG_BT_BLE_SMP_ENABLE: y
      CONFIG_BT_ACL_CONNECTIONS: "4"

logger:

external_components:
  - source:
      type: local
      path: ../components
    components: [ble_keyboard]

ble_keyboard:
  id: kb
  device_name: "Atom Media Remote"
  host_slots: 4

button:
  - platform: ble_keyboard
    keyboard_id: kb
    name: "Volume Up"
    action: "volume_up"
  - platform: ble_keyboard
    keyboard_id: kb
    name: "Mute"
    action: "mute"
  - platform: ble_keyboard
    keyboard_id: kb
    id: btn_playpause
    name: "Play / Pause"
    action: "play_pause"
  - platform: ble_keyboard
    keyboard_id: kb
    name: "Host 0"
    action:
      type: switch_host
      slot: 0

binary_sensor:
  - platform: ble_keyboard
    keyboard_id: kb
    name: "Paired"
  - platform: gpio
    name: "Atom Button"
    pin: { number: GPIO39, inverted: true, mode: { input: true } }
    on_press:
      - button.press: btn_playpause
