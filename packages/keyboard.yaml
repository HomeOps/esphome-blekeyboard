# Importable package: enable BLE on the ESP32 + instantiate the ble_keyboard.
#
# Add your `esp32: board:`, a network (`wifi:`/`ethernet:`) and an
# `external_components:` (where you pin the release); this package supplies the
# ESP-IDF Bluetooth sdkconfig (the part that's easy to get wrong), the keyboard
# component (id `kb`), a BLE-link sensor and a `send_keys` HA service. Pair it
# with media_keys.yaml. No substitutions of its own — the host sees the
# component's default BLE name (override with your own `ble_keyboard: device_name:`
# if you like). The `send_keys` service needs the native API, so a network
# component is required.

esp32:
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_ENABLED: y
      CONFIG_BT_CONTROLLER_ENABLED: y
      CONFIG_BT_BLUEDROID_ENABLED: y
      CONFIG_BT_NIMBLE_ENABLED: n
      CONFIG_BT_BLE_ENABLED: y
      CONFIG_BT_GATTS_ENABLE: y
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: n
      CONFIG_BT_BLE_42_ADV_EN: y
      CONFIG_BT_BLE_42_SCAN_EN: y
      CONFIG_BT_BLE_SMP_ENABLE: y
      CONFIG_BT_ACL_CONNECTIONS: "4"

ble_keyboard:
  id: kb
  host_slots: 4

# BLE link status — so HA (and Concerto) know whether the host is connected before
# sending a key.
binary_sensor:
  - platform: ble_keyboard
    keyboard_id: kb
    type: paired
    name: "BLE Paired"
    device_class: connectivity

# Home Assistant service to send ANY key, HID usage, or macro on demand — beyond
# the fixed media_keys buttons. Call it from HA as `esphome.<node>_send_keys`
# with an `action` string, using the component's action grammar:
#   named     volume_up | mute | power | play_pause | next_track | ctrl_alt_del | …
#   consumer  "consumer:0x40"     (raw HID Consumer-page usage, hex or decimal)
#   combo     "combo:0x01:0x4F"   (modifier:keycode on the Keyboard page)
#   text      "string:hello"  or just  "hello"   (typed as keystrokes)
#   macro     "menu|delay:200|down|down|select"  ('|'-separated steps, optional delay:ms)
# Merges with your own `api:` block (encryption, etc.); `services:` lists concatenate.
api:
  services:
    - service: send_keys
      variables:
        action: string
      then:
        - lambda: 'id(kb)->execute_action(action);'
        # Force the owning std::string arg type instead of the zero-copy
        # StringRef that ESPHome 2026.5+ picks for fully-synchronous chains.
        # StringRef's api instantiation is newer than std::string's, so after an
        # esphome upgrade a stale cached `user_services.cpp.o` can miss the
        # StringRef symbol -> "undefined reference to get_execute_arg_value
        # <StringRef>" at link. A non-synchronous action (this 0 ms delay) flips
        # codegen to the long-standing std::string type, which every api object
        # file provides. Harmless at runtime. (A clean build also fixes it.)
        - delay: 0ms

# Host-management buttons for the keyboard itself (not per-remote, so they live
# here in keyboard.yaml, which is imported once). They act on `kb`:
#   - "Forget All Hosts"  wipes every bond and re-advertises so a new host pairs.
#   - "Switch to Host N"  selects bond slot N-1; an EMPTY slot advertises
#                         undirected = pairing mode (point the TV at it to pair).
#   - "Forget Host N"     drops just slot N-1's bond.
# host_slots defaults to 4 above; these cover slots 0-3.
button:
  - platform: ble_keyboard
    keyboard_id: kb
    id: kb_forget_all
    name: "Forget All Hosts"
    action: "forget_all"
  - platform: ble_keyboard
    keyboard_id: kb
    id: kb_switch_host_1
    name: "Switch to Host 1"
    action: "switch_host:0"
  - platform: ble_keyboard
    keyboard_id: kb
    id: kb_switch_host_2
    name: "Switch to Host 2"
    action: "switch_host:1"
  - platform: ble_keyboard
    keyboard_id: kb
    id: kb_switch_host_3
    name: "Switch to Host 3"
    action: "switch_host:2"
  - platform: ble_keyboard
    keyboard_id: kb
    id: kb_switch_host_4
    name: "Switch to Host 4"
    action: "switch_host:3"
  - platform: ble_keyboard
    keyboard_id: kb
    id: kb_forget_host_1
    name: "Forget Host 1"
    action: "forget_host:0"
  - platform: ble_keyboard
    keyboard_id: kb
    id: kb_forget_host_2
    name: "Forget Host 2"
    action: "forget_host:1"
  - platform: ble_keyboard
    keyboard_id: kb
    id: kb_forget_host_3
    name: "Forget Host 3"
    action: "forget_host:2"
  - platform: ble_keyboard
    keyboard_id: kb
    id: kb_forget_host_4
    name: "Forget Host 4"
    action: "forget_host:3"
