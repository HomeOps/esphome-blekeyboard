# Importable package: media-control buttons -> BLE keyboard HID.
#
# Creates one button per canonical control (homeops-ir-canonical vocabulary) that
# has a BLE HID equivalent, grouped under a Home Assistant sub-device. Button ids
# are `${ble_device_id}_<canonical>` — the SAME id a control gets on the IR side
# (esphome-ir-codegen), so Concerto targets one canonical control across both
# transports.
#
# Import it once per remote. It targets a `ble_keyboard:` with id `kb` (what
# packages/keyboard.yaml creates). Two knobs: `ble_device_id` (the id +
# button-id prefix, e.g. master_room_tv) and `ble_device_name` (the pretty HA
# display name, e.g. "Master Room TV Remote"). Set them as substitutions (single
# remote, git package) or pass them per remote via `!include` `vars:` (several
# remotes on one node).
#
# Named actions (volume_up, mute, play_pause, next_track, prev_track, stop, power)
# are built into the component; the rest use raw HID usages — `consumer:` codes
# from the HID Consumer page (0x0C) and `combo:` codes from the Keyboard page
# (0x07). "Validity != correctness": a green compile proves the YAML; verify the
# keys against the real BLE host.

# The sub-device (${ble_device_id}) is declared once by keyboard.yaml; this package
# only adds buttons to it. Import keyboard.yaml alongside this one.
button:
  # --- power ---
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_power_toggle
    name: "Power"
    action: "power"

  # --- volume ---
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_volume_up
    name: "Volume Up"
    action: "volume_up"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_volume_down
    name: "Volume Down"
    action: "volume_down"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_mute
    name: "Mute"
    action: "mute"

  # --- channel (HID Consumer: Channel Increment/Decrement) ---
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_channel_up
    name: "Channel Up"
    action: { type: consumer, code: 0x9C }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_channel_down
    name: "Channel Down"
    action: { type: consumer, code: 0x9D }

  # --- transport ---
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_play_pause
    name: "Play Pause"
    action: "play_pause"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_play
    name: "Play"
    action: { type: consumer, code: 0xB0 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_pause
    name: "Pause"
    action: { type: consumer, code: 0xB1 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_stop
    name: "Stop"
    action: "stop"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_record
    name: "Record"
    action: { type: consumer, code: 0xB2 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_rewind
    name: "Rewind"
    action: { type: consumer, code: 0xB4 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_fast_forward
    name: "Fast Forward"
    action: { type: consumer, code: 0xB3 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_next
    name: "Next"
    action: "next_track"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_previous
    name: "Previous"
    action: "prev_track"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_eject
    name: "Eject"
    action: { type: consumer, code: 0xB8 }

  # --- navigation (HID Consumer: Menu usages 0x40-0x45, AC Back 0x224, AC Home 0x223) ---
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_menu
    name: "Menu"
    action: { type: consumer, code: 0x40 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_select
    name: "Select"
    action: { type: consumer, code: 0x41 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_up
    name: "Up"
    action: { type: consumer, code: 0x42 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_down
    name: "Down"
    action: { type: consumer, code: 0x43 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_left
    name: "Left"
    action: { type: consumer, code: 0x44 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_right
    name: "Right"
    action: { type: consumer, code: 0x45 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_back
    name: "Back"
    # AC Back (0x224) -> KEYCODE_BACK. Menu Escape (0x46) only maps to
    # KEYCODE_ESCAPE, which Android TV does not treat as Back (verified on a
    # Sony Bravia: the remote sends 0x224, and 0x46 produced KEY_ESC with no
    # back action).
    action: { type: consumer, code: 0x224 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_home
    name: "Home"
    action: { type: consumer, code: 0x223 }

  # --- video apps (canonical app_* controls) ---
  # App-launch has no HID usage of its own, so each app sends a distinct gamepad
  # button, continuing the standard HID Button-page numbering past the 16 named
  # gamepad buttons (gamepad.yaml uses 1-15). Host-agnostic, same model as
  # gamepad.yaml: we emit a standard button and the host's key layout decides which
  # app it opens (e.g. Android maps these to KEYCODE_VIDEO_APP_n). Buttons carry the
  # canonical ${ble_device_id}_app_* ids so Concerto targets one control across
  # transports.
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_youtube
    name: "YouTube"
    action: "button:17"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_netflix
    name: "Netflix"
    action: "button:18"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_prime_video
    name: "Prime Video"
    action: "button:19"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_disney_plus
    name: "Disney+"
    action: "button:20"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_hbo_max
    name: "Max"
    action: "button:21"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_hulu
    name: "Hulu"
    action: "button:22"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_apple_tv
    name: "Apple TV"
    action: "button:23"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_spotify
    name: "Spotify"
    action: "button:24"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_plex
    name: "Plex"
    action: "button:25"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_paramount_plus
    name: "Paramount+"
    action: "button:26"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_peacock
    name: "Peacock"
    action: "button:27"
