# Importable package: Sony Bravia (Android TV) remote -> BLE keyboard HID.
#
# A Sony-native alternative to media_keys.yaml. Import this INSTEAD of
# media_keys.yaml when the target is a Sony Bravia (Google/Android TV): it
# advertises the Sony remote's PnP identity so the TV applies its
# SONY_TV_VRC_001.kl key layout, and every button sends the exact HID
# Consumer-page usage captured from the physical "SONY TV VRC 001" remote
# (`adb shell getevent -lt`, the MSC_SCAN line) on a BRAVIA 4K AE2.
#
# The Menu, Settings, Input and app-launch usages sit ABOVE the old 0x3FF
# consumer ceiling, so they need the widened report descriptor (usages up to
# 0x7FFF). The standard keys (nav, volume, channel, play/pause) work on any
# host and are unchanged from media_keys.yaml.
#
# Import keyboard.yaml alongside this one and set the `ble_device_id` +
# `ble_device_name` substitutions (same knobs as media_keys.yaml). Button ids
# are `${ble_device_id}_<canonical>` — the SAME id a control gets on the IR
# side — so Concerto targets one canonical control across both transports.
#
# The PnP identity is read at bond time, so the FIRST flash that switches a
# node to this package needs a one-time re-pair (Forget on the TV + the
# keyboard's forget_all, then pair again).

# --- device identity ---------------------------------------------------------
# Present as the Sony remote (vendor 0x054C / product 0x0F22, device name
# "SONY TV VRC 001") so the Bravia applies SONY_TV_VRC_001.kl. Merges with the
# ble_keyboard block keyboard.yaml declares (same id `kb`).
#
# device_name is the GATT (0x2A00) / HID name the TV keys its key layout off, so
# it MUST be exactly "SONY TV VRC 001". But a Bravia's pairing scan won't surface
# a second device whose name matches your already-paired physical remote — so we
# advertise a DISTINCT name (advertised_name) that the pairing scan shows, while
# still reporting "SONY TV VRC 001" over GATT. Result: discoverable under a unique
# name, but still gets the Sony key layout. advertised_name defaults to the HA
# display name; override if you want something else (<=29 chars).
ble_keyboard:
  id: kb
  device_name: "SONY TV VRC 001"
  advertised_name: "${ble_device_name}"
  vendor_id_source: 2      # USB-IF
  vendor_id: 0x054C        # Sony Corporation
  product_id: 0x0F22
  product_version: 0x0011

# The sub-device (${ble_device_id}) is declared once by keyboard.yaml; this
# package only adds buttons to it. Import keyboard.yaml alongside this one.
button:
  # --- power ---
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_power_toggle
    name: "Power"
    action: "power"

  # --- navigation (Consumer: arrows 0x42-0x45, Menu Pick 0x41, AC Back/Home) ---
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_up
    name: "Up"
    action: { type: consumer, code: 0x42 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_down
    name: "Down"
    action: { type: consumer, code: 0x43 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_left
    name: "Left"
    action: { type: consumer, code: 0x44 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_right
    name: "Right"
    action: { type: consumer, code: 0x45 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_select
    name: "Select"
    action: { type: consumer, code: 0x41 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_back
    name: "Back"
    action: { type: consumer, code: 0x224 }   # AC Back -> KEYCODE_BACK
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_home
    name: "Home"
    action: { type: consumer, code: 0x223 }   # AC Home

  # --- Sony function buttons (vendor Consumer usages, need the widened range) ---
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_menu
    name: "Menu"
    action: { type: consumer, code: 0x51F }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_settings
    name: "Settings"
    action: { type: consumer, code: 0x586 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_guide
    name: "Guide"
    action: { type: consumer, code: 0x08D }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_tv
    name: "TV"
    action: { type: consumer, code: 0x089 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_input
    name: "Input"
    action: { type: consumer, code: 0x533 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_tools
    name: "Tools"
    action: { type: consumer, code: 0x3C3 }

  # --- volume / mute (standard named actions -> 0xE9 / 0xEA / 0xE2) ---
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_volume_up
    name: "Volume Up"
    action: "volume_up"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_volume_down
    name: "Volume Down"
    action: "volume_down"
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_mute
    name: "Mute"
    action: "mute"

  # --- channel (Consumer: Channel Increment/Decrement) ---
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_channel_up
    name: "Channel Up"
    action: { type: consumer, code: 0x9C }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_channel_down
    name: "Channel Down"
    action: { type: consumer, code: 0x9D }

  # --- transport (named play_pause -> 0xCD, matches the remote) ---
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_play_pause
    name: "Play Pause"
    action: "play_pause"

  # --- app-launch (Sony vendor Consumer usages, need the widened range) ---
  # Captured from the remote's dedicated app buttons. Each launches its app via
  # the Sony key layout; canonical ${ble_device_id}_app_* ids so Concerto
  # targets one control across transports.
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_youtube
    name: "YouTube"
    action: { type: consumer, code: 0x4E5 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_netflix
    name: "Netflix"
    action: { type: consumer, code: 0x547 }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_disney_plus
    name: "Disney+"
    action: { type: consumer, code: 0x4EB }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_prime_video
    name: "Prime Video"
    action: { type: consumer, code: 0x4EA }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_crunchyroll
    name: "Crunchyroll"
    action: { type: consumer, code: 0x4FB }
  - platform: ble_keyboard
    keyboard_id: kb
    device_id: ${ble_device_id}
    id: ${ble_device_id}_app_sony_pictures
    name: "Sony Pictures Core"
    action: { type: consumer, code: 0x4F0 }
