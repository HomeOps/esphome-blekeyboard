name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # Weekly run so we catch upstream ESPHome releases breaking the component
  # *before* a user does (the exact failure mode that killed the original).
  schedule:
    - cron: "0 6 * * 1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yamllint
      - name: Python syntax check (component)
        run: python -m compileall -q components
      - name: yamllint test configs
        run: yamllint -d relaxed tests

  compile:
    name: Compile (${{ matrix.config }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [tests/atom.yaml, tests/esp32.yaml, tests/package.yaml]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache PlatformIO + ESP-IDF
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-esp-idf-${{ hashFiles('tests/*.yaml') }}
          restore-keys: pio-esp-idf-
      - name: Install ESPHome (latest — this is the upstream-breakage signal)
        run: pip install esphome
      - run: esphome version
      - name: Compile ${{ matrix.config }}
        run: esphome compile ${{ matrix.config }}
